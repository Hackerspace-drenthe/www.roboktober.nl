name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  backend-style:
    name: Backend Style (Pint)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: roboktober-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, fileinfo, sqlite3, pdo_sqlite
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run code style check
        run: ./vendor/bin/pint --test

  backend-static-analysis:
    name: Backend Static Analysis (PHPStan)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: roboktober-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, fileinfo, sqlite3, pdo_sqlite
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run static analysis
        run: ./vendor/bin/phpstan analyse --no-progress

  backend-tests:
    name: Backend Tests (${{ matrix.suite }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        suite: [Unit, Feature]

    defaults:
      run:
        working-directory: roboktober-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, fileinfo, sqlite3, pdo_sqlite
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run backend tests
        run: php artisan test --testsuite=${{ matrix.suite }}

  frontend-quality:
    name: Frontend Quality (Lint + Typecheck)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: roboktober-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
          cache: npm
          cache-dependency-path: roboktober-frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run lint checks
        run: npm run lint:check

      - name: Run type checks
        run: npm run type-check

  frontend-tests:
    name: Frontend Tests (Vitest + Playwright)
    runs-on: ubuntu-latest

    needs:
      - frontend-quality

    defaults:
      run:
        working-directory: roboktober-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
          cache: npm
          cache-dependency-path: roboktober-frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run frontend test suite
        run: npm test
