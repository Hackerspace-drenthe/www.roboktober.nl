name: Deploy to Railway (manual)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Why are you deploying?
        required: false
        default: Manual production deploy

jobs:
  deploy:
    name: Trigger Railway deploy hook
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Log deploy intent
        run: |
          echo "Deploy requested by: ${{ github.actor }}"
          echo "Reason: ${{ github.event.inputs.reason }}"
          echo "Commit: ${{ github.sha }}"

      - name: Trigger Railway deployment
        env:
          RAILWAY_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RAILWAY_DEPLOY_HOOK_URL" ]; then
            echo "Missing secret: RAILWAY_DEPLOY_HOOK_URL"
            exit 1
          fi

          curl --fail --silent --show-error \
            -X POST \
            "$RAILWAY_DEPLOY_HOOK_URL"

      - name: Deployment trigger sent
        run: echo "Railway deploy hook triggered successfully."