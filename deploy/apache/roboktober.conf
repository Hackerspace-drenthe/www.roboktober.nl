<VirtualHost *:80>
    ServerName roboktober.nl
    ServerAlias www.roboktober.nl 192.168.1.10
    DocumentRoot /var/www/www.roboktober.nl/roboktober-api/public

    <Directory /var/www/www.roboktober.nl/roboktober-api/public>
        AllowOverride All
        Require all granted
        Options FollowSymLinks
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/roboktober-error.log
    CustomLog ${APACHE_LOG_DIR}/roboktober-access.log combined

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L,NE]
</VirtualHost>
